<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="spans.css">
</head>
<body>
    <header>
        <h1>Clock:</h1>
        <div id="selecting-clock-container">
            <div id="left-arrow" class="selection-arrow">◀</div>
            <div id="clock-selected"></div>
            <div id="right-arrow" class="selection-arrow">▶</div>
        </div>
    </header>
    <main>
        <div id="clock">
            <!-- ONLY analog roman(analog) math(analog) -->
            <div id="analog-clock" class="hidden">
                <div id="center-point"></div>

                <div id="sec-arrow" class="arrow-clock"></div>
                <div id="min-arrow" class="arrow-clock"></div>
                <div id="hou-arrow" class="arrow-clock"></div>

                <div id="mini-arrows-container"></div>

                <div id="hours-numbers"></div>
            </div>

            <!-- ONLY digital -->
            <div id="digital-clock">
                <div id="time-standard"></div>
            </div>

            <!-- ONLY programmer -->
            <div id="programmer-clock" class="hidden">
                <pre>
                    <code id="code-clock">

                    </code>
                </pre>
            </div>
        </div>
    </main>
    <script src="clock.js"></script>
</body>
</html>
