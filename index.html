<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="fonts.css">
</head>
<body class="normal">
    <header>
        <h1>Clock:</h1>
        <div id="selecting-clock-container">
            <div id="left-arrow" class="selection-arrow">◀</div>
            <div id="clock-selected"></div>
            <div id="right-arrow" class="selection-arrow">▶</div>
        </div>
    </header>
    <main>
        <div id="clock">
            <div>
                <div id="center-point"></div>
                <div id="sec-arrow"></div>
                <div id="min-arrow"></div>
                <div id="hou-arrow"></div>
            </div>
            <div id="standard-clock">
                <div id="time-standard"></div>
            </div>
        </div>
    </main>
    <script src="clock.js"></script>
</body>
</html>
